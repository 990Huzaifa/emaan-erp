name: Laravel Deployment via FTP

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Deploy Laravel Project via FTP
    runs-on: ubuntu-latest

    steps:
    # Checkout the code
    - name: Checkout Code
      uses: actions/checkout@v3

    # Install PHP and dependencies
    - name: Set up PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: '8.1' # Adjust based on your Laravel requirements
        extensions: mbstring, bcmath, pdo, curl, dom, json, openssl
        coverage: none

    - name: Install Composer Dependencies
      run: composer install --no-dev --no-interaction --prefer-dist

    # Build frontend assets (if needed)
    - name: Install NPM Dependencies and Build Assets
      run: |
        npm install
        npm run prod

    # Deploy files via FTP
    - name: Deploy via FTP
      uses: SamKirkland/FTP-Deploy-Action@4.5.0
      with:
        server: ${{ secrets.FTP_SERVER }}
        username: ${{ secrets.FTP_USERNAME }}
        password: ${{ secrets.FTP_PASSWORD }}
        port: 21
        protocol: ftp
        local-dir: ./
        server-dir: /home/zetdsqxs/eeman.zetdigi.comm
        log-level: verbose

    # Set file permissions
    - name: Set Permissions
      run: |
        lftp -u ${{ secrets.FTP_USERNAME }},${{ secrets.FTP_PASSWORD }} ${{ secrets.FTP_SERVER }} <<EOF
        chmod -R 755 /home/zetdsqxs/eeman.zetdigi.com
        chmod -R 775 /home/zetdsqxs/eeman.zetdigi.com/storage
        chmod -R 775 /home/zetdsqxs/eeman.zetdigi.com/bootstrap/cache
        bye
        EOF